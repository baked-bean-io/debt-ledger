# Copy to .github/workflows/debt-ledger.yml in a repo that has a .techdebt/items.json
name: debt-ledger
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write
jobs:
  debt-ledger:
    runs-on: ubuntu-latest
    steps:
      # Checkout is required — on pull_request it checks out the PR merge ref,
      # which contains the PR's ledger changes; the action reads the ledger
      # from the working tree.
      - uses: actions/checkout@v4
      - uses: baked-bean-io/debt-ledger/action@main
